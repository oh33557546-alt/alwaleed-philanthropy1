<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مؤسسة الوليد للإنسانية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <nav class="navbar" id="mainNav">
        <div class="navbar-logo">
            <img src="https://alwaleedphilanthropies.org/themes/custom/alwaleed/logo.svg" alt="Logo" style="height: 50px;">
        </div>
        <ul class="nav-links">
            <li><a href="#">من نحن</a></li>
            <li><a href="#">مجالات التركيز</a></li>
            <li><a href="#">مركز الأخبار</a></li>
            <li><a href="portal.html" class="portal-btn">بوابة التقديم</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-overlay"></div>
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="https://alwaleedphilanthropies.org/themes/custom/alwaleed/video/home-video.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1 class="hero-title">التزامنا بالإنسانية لا يعرف حدوداً</h1>
            <p>نعمل من أجل عالم أكثر تسامحاً وقبولاً ومساواة</p>
            <button class="cta-main" onclick="location.href='portal.html'">اكتشف مبادراتنا</button>
        </div>
    </header>

    <script>
        window.onscroll = function() {
            var nav = document.getElementById('mainNav');
            if (window.pageYOffset > 100) {
                nav.classList.add("scrolled");
            } else {
                nav.classList.remove("scrolled");
            }
        };
    </script>
</body>
</html>
